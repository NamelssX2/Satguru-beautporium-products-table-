<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satguru Beautporium · Product Inventory System</title>
    <style>
        /* ===== MODERN CSS RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* ===== PROFESSIONAL COLOR PALETTE ===== */
        :root {
            --primary: #1a1e2b;
            --primary-light: #2a2f3f;
            --primary-soft: #f0f2f6;
            --accent: #8b5f7c;
            --accent-light: #d9c5d2;
            --text-primary: #1e1e2a;
            --text-secondary: #5a5f73;
            --text-tertiary: #8e94a7;
            --border: #e4e7ec;
            --bg-white: #ffffff;
            --bg-soft: #f9fafc;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.05), 0 8px 16px rgba(0, 0, 0, 0.02);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        body {
            background: var(--bg-soft);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px;
            color: var(--text-primary);
        }

        /* ===== MAIN CONTAINER ===== */
        .inventory-system {
            max-width: 1600px;
            width: 100%;
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* ===== HEADER SECTION ===== */
        .system-header {
            padding: 24px 32px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 24px;
        }

        .brand-text h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .brand-text p {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        /* ===== BUTTON STYLES ===== */
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--bg-white);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--bg-soft);
            border-color: var(--accent-light);
            color: var(--primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            border-color: var(--primary-light);
            color: white;
        }

        .btn-accent {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-accent:hover {
            background: #7a526b;
            border-color: #7a526b;
        }

        .btn-icon {
            padding: 10px;
            font-size: 18px;
        }

        /* ===== SEARCH BAR ===== */
        .search-section {
            padding: 20px 32px;
            background: var(--bg-soft);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-wrapper {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 18px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            font-size: 15px;
            background: var(--bg-white);
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(139, 95, 124, 0.1);
        }

        .stats-badge {
            background: var(--bg-white);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        /* ===== SHEETS/TABS SECTION ===== */
        .sheets-container {
            padding: 20px 32px 0 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-white);
        }

        .sheets-list {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            flex: 1;
        }

        .sheet-tab {
            padding: 12px 28px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-tertiary);
            cursor: pointer;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .sheet-tab:hover {
            color: var(--primary);
            background: var(--bg-soft);
        }

        .sheet-tab.active {
            color: var(--primary);
            background: var(--bg-soft);
            font-weight: 600;
        }

        .sheet-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }

        .delete-sheet {
            width: 22px;
            height: 22px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-tertiary);
            transition: all 0.2s;
        }

        .delete-sheet:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ===== TABLE SECTION ===== */
        .table-container {
            padding: 0 32px;
            background: var(--bg-white);
            max-height: 60vh;
            overflow: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-light) var(--bg-soft);
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: var(--bg-soft);
        }

        .table-container::-webkit-scrollbar-thumb {
            background: var(--accent-light);
            border-radius: 10px;
        }

        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .inventory-table th {
            text-align: left;
            padding: 18px 16px;
            background: var(--bg-white);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-white);
            z-index: 10;
        }

        .inventory-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 14px;
        }

        .inventory-table tr:hover td {
            background: var(--bg-soft);
        }

        .checkbox-col {
            width: 40px;
        }

        .product-input {
            width: 100%;
            padding: 8px 0;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px dashed transparent;
            transition: all 0.2s;
        }

        .product-input:hover {
            border-bottom-color: var(--border);
        }

        .product-input:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px !important;
            color: var(--text-tertiary);
            font-size: 15px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* ===== BULK ACTIONS BAR ===== */
        .bulk-actions {
            padding: 20px 32px 32px 32px;
            background: var(--bg-white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .bulk-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .selected-counter {
            background: var(--bg-soft);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .paste-zone {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-soft);
            padding: 4px 4px 4px 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .paste-hint {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* ===== TOOLTIPS ===== */
        [data-tooltip] {
            position: relative;
            cursor: help;
        }

        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: var(--primary);
            color: white;
            font-size: 12px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
            margin-bottom: 8px;
        }

        [data-tooltip]:hover:before {
            opacity: 1;
            visibility: visible;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .inventory-table tbody tr {
            animation: slideIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="inventory-system">
        <!-- Header -->
        <header class="system-header">
            <div class="brand">
                <div class="brand-logo">🪞</div>
                <div class="brand-text">
                    <h1>Satguru Beautporium</h1>
                    <p>Product inventory management · unlimited products</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn" id="addSampleBtn" data-tooltip="Add sample products">
                    <span>📋</span> Add samples
                </button>
                <button class="btn btn-primary" id="newTableBtn">
                    <span>+</span> New sheet
                </button>
            </div>
        </header>

        <!-- Search -->
        <div class="search-section">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="globalSearch" placeholder="Search across all products..." autocomplete="off">
            </div>
            <div class="stats-badge" id="tableStats">
                Loading...
            </div>
        </div>

        <!-- Sheets/Tabs -->
        <div class="sheets-container">
            <div class="sheets-list" id="sheetsList"></div>
            <button class="btn btn-icon" id="addSheetBtn" data-tooltip="Create new sheet">
                <span>+</span>
            </button>
        </div>

        <!-- Main Table -->
        <div class="table-container" id="tableContainer">
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th class="checkbox-col">
                            <input type="checkbox" id="selectAllCheckbox" style="accent-color: var(--accent);">
                        </th>
                        <th>Product name</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Dynamic content will be inserted here -->
                </tbody>
            </table>
        </div>

        <!-- Bulk Actions -->
        <div class="bulk-actions">
            <div class="bulk-left">
                <span class="selected-counter" id="selectedCount">0 selected</span>
                <button class="btn" id="deleteSelectedBtn">
                    <span>🗑️</span> Delete selected
                </button>
                <div class="paste-zone">
                    <span class="paste-hint">📋 Paste multiple products</span>
                    <button class="btn btn-accent" id="pasteBtn">
                        Paste here
                    </button>
                </div>
            </div>
            <button class="btn" id="addEmptyRowBtn">
                <span>+</span> Add empty row
            </button>
        </div>
    </div>

    <script>
        (function() {
            // ========== STATE MANAGEMENT ==========
            class InventoryManager {
                constructor() {
                    this.tables = [];
                    this.activeTableId = null;
                    this.searchTerm = '';
                    this.init();
                }

                init() {
                    this.loadFromStorage();
                    if (this.tables.length === 0) {
                        this.createDefaultTable();
                    }
                    this.render();
                    this.attachEvents();
                }

                loadFromStorage() {
                    const stored = localStorage.getItem('satguru_inventory');
                    if (stored) {
                        try {
                            this.tables = JSON.parse(stored);
                        } catch (e) {
                            this.tables = [];
                        }
                    }
                }

                saveToStorage() {
                    localStorage.setItem('satguru_inventory', JSON.stringify(this.tables));
                }

                createDefaultTable() {
                    this.tables = [{
                        id: this.generateId(),
                        name: 'Products',
                        products: [
                            'Lakmé Absolute Lipstick - Ruby Red',
                            'Mamaearth Ubtan Face Wash',
                            'Biotique Bio Dandruff Shampoo',
                            'Lotus Herbals Safe Sun SPF50',
                            'Maybelline Colossal Kajal',
                            'Sugar Contour De Force - Bronze',
                            'Plum Green Tea Pore Cleanser',
                            'The Ordinary Niacinamide 10%'
                        ]
                    }];
                    this.activeTableId = this.tables[0].id;
                    this.saveToStorage();
                }

                generateId() {
                    return 'sheet_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                }

                getActiveTable() {
                    return this.tables.find(t => t.id === this.activeTableId) || null;
                }

                // ========== CRUD OPERATIONS ==========
                addTable(name = null) {
                    const newName = name || `Sheet ${this.tables.length + 1}`;
                    const newTable = {
                        id: this.generateId(),
                        name: newName,
                        products: []
                    };
                    this.tables.push(newTable);
                    this.activeTableId = newTable.id;
                    this.saveToStorage();
                    this.render();
                }

                deleteTable(tableId) {
                    if (this.tables.length <= 1) {
                        this.showNotification('Cannot delete the last sheet', 'warning');
                        return false;
                    }
                    this.tables = this.tables.filter(t => t.id !== tableId);
                    if (this.activeTableId === tableId) {
                        this.activeTableId = this.tables[0].id;
                    }
                    this.saveToStorage();
                    this.render();
                    return true;
                }

                addProducts(products) {
                    const table = this.getActiveTable();
                    if (!table) return;
                    table.products.push(...products.filter(p => p.trim() !== ''));
                    this.saveToStorage();
                    this.render();
                }

                updateProduct(index, value) {
                    const table = this.getActiveTable();
                    if (table && table.products[index] !== undefined) {
                        table.products[index] = value;
                        this.saveToStorage();
                    }
                }

                deleteSelectedRows(selectedIndices) {
                    const table = this.getActiveTable();
                    if (!table || selectedIndices.length === 0) return;

                    // Get filtered products based on search
                    const filteredProducts = this.getFilteredProducts();
                    const indicesToDelete = new Set(
                        selectedIndices.map(idx => filteredProducts[idx])
                    );

                    table.products = table.products.filter((_, idx) => !indicesToDelete.has(idx));
                    this.saveToStorage();
                    this.render();
                }

                // ========== UTILITIES ==========
                getFilteredProducts() {
                    const table = this.getActiveTable();
                    if (!table) return [];
                    
                    if (!this.searchTerm.trim()) {
                        return table.products.map((_, idx) => idx);
                    }

                    const term = this.searchTerm.toLowerCase();
                    return table.products.reduce((acc, product, idx) => {
                        if (product.toLowerCase().includes(term)) acc.push(idx);
                        return acc;
                    }, []);
                }

                // ========== RENDERING ==========
                render() {
                    this.renderSheets();
                    this.renderTable();
                    this.updateStats();
                }

                renderSheets() {
                    const sheetsList = document.getElementById('sheetsList');
                    if (!sheetsList) return;

                    sheetsList.innerHTML = this.tables.map(table => {
                        const isActive = table.id === this.activeTableId;
                        return `
                            <button class="sheet-tab ${isActive ? 'active' : ''}" data-table-id="${table.id}">
                                ${this.escapeHtml(table.name)}
                                <span class="delete-sheet" data-delete-id="${table.id}" onclick="event.stopPropagation()">✕</span>
                            </button>
                        `;
                    }).join('');

                    // Attach sheet click events
                    document.querySelectorAll('.sheet-tab').forEach(tab => {
                        tab.addEventListener('click', (e) => {
                            if (e.target.classList.contains('delete-sheet')) return;
                            const tableId = tab.dataset.tableId;
                            if (tableId) {
                                this.activeTableId = tableId;
                                this.render();
                            }
                        });
                    });

                    // Attach delete events
                    document.querySelectorAll('.delete-sheet').forEach(del => {
                        del.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const tableId = del.dataset.deleteId;
                            if (tableId) this.deleteTable(tableId);
                        });
                    });
                }

                renderTable() {
                    const tbody = document.getElementById('tableBody');
                    const selectAll = document.getElementById('selectAllCheckbox');
                    if (!tbody) return;

                    const table = this.getActiveTable();
                    if (!table) return;

                    const filteredIndices = this.getFilteredProducts();
                    
                    if (filteredIndices.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="2" class="empty-state">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                                    </svg>
                                    <p>${this.searchTerm ? 'No products match your search' : 'No products yet. Paste or add new rows.'}</p>
                                </td>
                            </tr>
                        `;
                        if (selectAll) selectAll.checked = false;
                        return;
                    }

                    tbody.innerHTML = filteredIndices.map((originalIdx, displayIdx) => `
                        <tr data-original-index="${originalIdx}">
                            <td>
                                <input type="checkbox" class="row-checkbox" data-display-index="${displayIdx}" style="accent-color: var(--accent);">
                            </td>
                            <td>
                                <input type="text" class="product-input" value="${this.escapeHtml(table.products[originalIdx])}" data-original-index="${originalIdx}" placeholder="Enter product name">
                            </td>
                        </tr>
                    `).join('');

                    // Attach input events
                    document.querySelectorAll('.product-input').forEach(input => {
                        input.addEventListener('input', (e) => {
                            const idx = e.target.dataset.originalIndex;
                            if (idx !== undefined) {
                                this.updateProduct(parseInt(idx), e.target.value);

    <script>
        (function() {
            // ========== STATE MANAGEMENT ==========
            class InventoryManager {
                constructor() {
                    this.tables = [];
                    this.activeTableId = null;
                    this.searchTerm = '';
                    this.init();
                }

                init() {
                    this.loadFromStorage();
                    if (this.tables.length === 0) {
                        this.createDefaultTable();
                    }
                    this.render();
                    this.attachEvents();
                }

                loadFromStorage() {
                    const stored = localStorage.getItem('satguru_inventory');
                    if (stored) {
                        try {
                            this.tables = JSON.parse(stored);
                        } catch (e) {
                            this.tables = [];
                        }
                    }
                }

                saveToStorage() {
                    localStorage.setItem('satguru_inventory', JSON.stringify(this.tables));
                }

                createDefaultTable() {
                    this.tables = [{
                        id: this.generateId(),
                        name: 'Products',
                        products: [
                            'Lakmé Absolute Lipstick - Ruby Red',
                            'Mamaearth Ubtan Face Wash',
                            'Biotique Bio Dandruff Shampoo',
                            'Lotus Herbals Safe Sun SPF50',
                            'Maybelline Colossal Kajal',
                            'Sugar Contour De Force - Bronze',
                            'Plum Green Tea Pore Cleanser',
                            'The Ordinary Niacinamide 10%'
                        ]
                    }];
                    this.activeTableId = this.tables[0].id;
                    this.saveToStorage();
                }

                generateId() {
                    return 'sheet_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                }

                getActiveTable() {
                    return this.tables.find(t => t.id === this.activeTableId) || null;
                }

                // ========== CRUD OPERATIONS ==========
                addTable(name = null) {
                    const newName = name || `Sheet ${this.tables.length + 1}`;
                    const newTable = {
                        id: this.generateId(),
                        name: newName,
                        products: []
                    };
                    this.tables.push(newTable);
                    this.activeTableId = newTable.id;
                    this.saveToStorage();
                    this.render();
                }

                deleteTable(tableId) {
                    if (this.tables.length <= 1) {
                        this.showNotification('Cannot delete the last sheet', 'warning');
                        return false;
                    }
                    this.tables = this.tables.filter(t => t.id !== tableId);
                    if (this.activeTableId === tableId) {
                        this.activeTableId = this.tables[0].id;
                    }
                    this.saveToStorage();
                    this.render();
                    return true;
                }

                addProducts(products) {
                    const table = this.getActiveTable();
                    if (!table) return;
                    table.products.push(...products.filter(p => p.trim() !== ''));
                    this.saveToStorage();
                    this.render();
                }

                updateProduct(index, value) {
                    const table = this.getActiveTable();
                    if (table && table.products[index] !== undefined) {
                        table.products[index] = value;
                        this.saveToStorage();
                    }
                }

                deleteSelectedRows(selectedIndices) {
                    const table = this.getActiveTable();
                    if (!table || selectedIndices.length === 0) return;

                    // Get filtered products based on search
                    const filteredProducts = this.getFilteredProducts();
                    const indicesToDelete = new Set(
                        selectedIndices.map(idx => filteredProducts[idx])
                    );

                    table.products = table.products.filter((_, idx) => !indicesToDelete.has(idx));
                    this.saveToStorage();
                    this.render();
                }

                // ========== UTILITIES ==========
                getFilteredProducts() {
                    const table = this.getActiveTable();
                    if (!table) return [];
                    
                    if (!this.searchTerm.trim()) {
                        return table.products.map((_, idx) => idx);
                    }

                    const term = this.searchTerm.toLowerCase();
                    return table.products.reduce((acc, product, idx) => {
                        if (product.toLowerCase().includes(term)) acc.push(idx);
                        return acc;
                    }, []);
                }

                // ========== RENDERING ==========
                render() {
                    this.renderSheets();
                    this.renderTable();
                    this.updateStats();
                }

                renderSheets() {
                    const sheetsList = document.getElementById('sheetsList');
                    if (!sheetsList) return;

                    sheetsList.innerHTML = this.tables.map(table => {
                        const isActive = table.id === this.activeTableId;
                        return `
                            <button class="sheet-tab ${isActive ? 'active' : ''}" data-table-id="${table.id}">
                                ${this.escapeHtml(table.name)}
                                <span class="delete-sheet" data-delete-id="${table.id}" onclick="event.stopPropagation()">✕</span>
                            </button>
                        `;
                    }).join('');

                    // Attach sheet click events
                    document.querySelectorAll('.sheet-tab').forEach(tab => {
                        tab.addEventListener('click', (e) => {
                            if (e.target.classList.contains('delete-sheet')) return;
                            const tableId = tab.dataset.tableId;
                            if (tableId) {
                                this.activeTableId = tableId;
                                this.render();
                            }
                        });
                    });

                    // Attach delete events
                    document.querySelectorAll('.delete-sheet').forEach(del => {
                        del.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const tableId = del.dataset.deleteId;
                            if (tableId) this.deleteTable(tableId);
                        });
                    });
                }

                renderTable() {
                    const tbody = document.getElementById('tableBody');
                    const selectAll = document.getElementById('selectAllCheckbox');
                    if (!tbody) return;

                    const table = this.getActiveTable();
                    if (!table) return;

                            <tr>
                                <td colspan="2" class="empty-state">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                                    </svg>
                                    <p>${this.searchTerm ? 'No products match your search' : 'No products yet. Paste or add new rows.'}</p>
                                </td>
                            </tr>
                        `;
                        if (selectAll) selectAll.checked = false;
                        return;
                    }

                    tbody.innerHTML = filteredIndices.map((originalIdx, displayIdx) => `
                        <tr data-original-index="${originalIdx}">

                            </td>

                                <input type="text" class="product-input" value="${this.escapeHtml(table.products[originalIdx])}" data-original-index="${originalIdx}" placeholder="Enter product name">
                            </td>

        }

        /* ===== SHEETS/TABS SECTION ===== */
        .sheets-container {
            padding: 20px 32px 0 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-white);
        }

        .sheets-list {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            flex: 1;
        }

        .sheet-tab {
            padding: 12px 28px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-tertiary);
            cursor: pointer;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .sheet-tab:hover {
            color: var(--primary);
            background: var(--bg-soft);
        }

        .sheet-tab.active {
            color: var(--primary);
            background: var(--bg-soft);
            font-weight: 600;
        }

        .sheet-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }

        .delete-sheet {
            width: 22px;
            height: 22px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-tertiary);
            transition: all 0.2s;
        }

        .delete-sheet:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ===== TABLE SECTION ===== */
        .table-container {
            padding: 0 32px;
            background: var(--bg-white);
            max-height: 60vh;
            overflow: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-light) var(--bg-soft);
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: var(--bg-soft);
        }

        .table-container::-webkit-scrollbar-thumb {
            background: var(--accent-light);
            border-radius: 10px;
        }

        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .inventory-table th {
            text-align: left;
            padding: 18px 16px;
            background: var(--bg-white);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-white);
            z-index: 10;
        }

        .inventory-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 14px;
        }

        .inventory-table tr:hover td {
            background: var(--bg-soft);
        }

        .checkbox-col {
            width: 40px;
        }

        .product-input {
            width: 100%;
            padding: 8px 0;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px dashed transparent;
            transition: all 0.2s;
        }

        .product-input:hover {
            border-bottom-color: var(--border);
        }

        .product-input:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px !important;
            color: var(--text-tertiary);
            font-size: 15px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* ===== BULK ACTIONS BAR ===== */
        .bulk-actions {
            padding: 20px 32px 32px 32px;
            background: var(--bg-white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .bulk-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .selected-counter {
            background: var(--bg-soft);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .paste-zone {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-soft);
            padding: 4px 4px 4px 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .paste-hint {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* ===== TOOLTIPS ===== */
        [data-tooltip] {
            position: relative;
            cursor: help;
        }

        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: var(--primary);
            color: white;
            font-size: 12px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
            margin-bottom: 8px;
        }

        [data-tooltip]:hover:before {
            opacity: 1;
            visibility: visible;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .inventory-table tbody tr {
            animation: slideIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="inventory-system">
        <!-- Header -->
        <header class="system-header">
            <div class="brand">
                <div class="brand-logo">🪞</div>
                <div class="brand-text">
                    <h1>Satguru Beautporium</h1>
                    <p>Product inventory management · unlimited products</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn" id="addSampleBtn" data-tooltip="Add sample products">
                    <span>📋</span> Add samples
                </button>
                <button class="btn btn-primary" id="newTableBtn">
                    <span>+</span> New sheet
                </button>
            </div>
        </header>

        <!-- Search -->
        <div class="search-section">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="globalSearch" placeholder="Search across all products..." autocomplete="off">
            </div>
            <div class="stats-badge" id="tableStats">
                Loading...
            </div>
        </div>

        <!-- Sheets/Tabs -->
        <div class="sheets-container">
            <div class="sheets-list" id="sheetsList"></div>
            <button class="btn btn-icon" id="addSheetBtn" data-tooltip="Create new sheet">
                <span>+</span>
            </button>
        </div>

        <!-- Main Table -->
        <div class="table-container" id="tableContainer">
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th class="checkbox-col">
                            <input type="checkbox" id="selectAllCheckbox" style="accent-color: var(--accent);">
                        </th>
                        <th>Product name</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Dynamic content will be inserted here -->
                </tbody>
            </table>
        </div>

        <!-- Bulk Actions -->
        <div class="bulk-actions">
            <div class="bulk-left">
                <span class="selected-counter" id="selectedCount">0 selected</span>
                <button class="btn" id="deleteSelectedBtn">
                    <span>🗑️</span> Delete selected
                </button>
                <div class="paste-zone">
                    <span class="paste-hint">📋 Paste multiple products</span>
                    <button class="btn btn-accent" id="pasteBtn">
                        Paste here
                    </button>
                </div>
            </div>
            <button class="btn" id="addEmptyRowBtn">
                <span>+</span> Add empty row
            </button>
        </div>
    </div>

    <script>
        (function() {
            // ========== STATE MANAGEMENT ==========
            class InventoryManager {
                constructor() {
                    this.tables = [];
                    this.activeTableId = null;
                    this.searchTerm = '';
                    this.init();
                }

                init() {
                    this.loadFromStorage();
                    if (this.tables.length === 0) {
                        this.createDefaultTable();
                    }
                    this.render();
                    this.attachEvents();
                }

                loadFromStorage() {
                    const stored = localStorage.getItem('satguru_inventory');
                    if (stored) {
                        try {
                            this.tables = JSON.parse(stored);
                        } catch (e) {
                            this.tables = [];
                        }
                    }
                }

                saveToStorage() {
                    localStorage.setItem('satguru_inventory', JSON.stringify(this.tables));
                }

                createDefaultTable() {
                    this.tables = [{
                        id: this.generateId(),
                        name: 'Products',
                        products: [
                            'Lakmé Absolute Lipstick - Ruby Red',
                            'Mamaearth Ubtan Face Wash',
                            'Biotique Bio Dandruff Shampoo',
                            'Lotus Herbals Safe Sun SPF50',
                            'Maybelline Colossal Kajal',
                            'Sugar Contour De Force - Bronze',
                            'Plum Green Tea Pore Cleanser',
                            'The Ordinary Niacinamide 10%'
                        ]
                    }];
                    this.activeTableId = this.tables[0].id;
                    this.saveToStorage();
                }

                generateId() {
                    return 'sheet_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                }

                getActiveTable() {
                    return this.tables.find(t => t.id === this.activeTableId) || null;
                }

                // ========== CRUD OPERATIONS ==========
                addTable(name = null) {
                    const newName = name || `Sheet ${this.tables.length + 1}`;
                    const newTable = {
                        id: this.generateId(),
                        name: newName,
                        products: []
                    };
                    this.tables.push(newTable);
                    this.activeTableId = newTable.id;
                    this.saveToStorage();
                    this.render();
                }

                deleteTable(tableId) {
                    if (this.tables.length <= 1) {
                        this.showNotification('Cannot delete the last sheet', 'warning');
                        return false;
                    }
                    this.tables = this.tables.filter(t => t.id !== tableId);
                    if (this.activeTableId === tableId) {
                        this.activeTableId = this.tables[0].id;
                    }
                    this.saveToStorage();
                    this.render();
                    return true;
                }

                addProducts(products) {
                    const table = this.getActiveTable();
                    if (!table) return;
                    table.products.push(...products.filter(p => p.trim() !== ''));
                    this.saveToStorage();
                    this.render();
                }

                updateProduct(index, value) {
                    const table = this.getActiveTable();
                    if (table && table.products[index] !== undefined) {
                        table.products[index] = value;
                        this.saveToStorage();
                    }
                }

                deleteSelectedRows(selectedIndices) {
                    const table = this.getActiveTable();
                    if (!table || selectedIndices.length === 0) return;

                    // Get filtered products based on search
                    const filteredProducts = this.getFilteredProducts();
                    const indicesToDelete = new Set(
                        selectedIndices.map(idx => filteredProducts[idx])
                    );

                    table.products = table.products.filter((_, idx) => !indicesToDelete.has(idx));
                    this.saveToStorage();
                    this.render();
                }

                // ========== UTILITIES ==========
                getFilteredProducts() {
                    const table = this.getActiveTable();
                    if (!table) return [];
                    
                    if (!this.searchTerm.trim()) {
                        return table.products.map((_, idx) => idx);
                    }

                    const term = this.searchTerm.toLowerCase();
                    return table.products.reduce((acc, product, idx) => {
                        if (product.toLowerCase().includes(term)) acc.push(idx);
                        return acc;
                    }, []);
                }

                // ========== RENDERING ==========
                render() {
                    this.renderSheets();
                    this.renderTable();
                    this.updateStats();
                }

                renderSheets() {
                    const sheetsList = document.getElementById('sheetsList');
                    if (!sheetsList) return;

                    sheetsList.innerHTML = this.tables.map(table => {
                        const isActive = table.id === this.activeTableId;
                        return `
                            <button class="sheet-tab ${isActive ? 'active' : ''}" data-table-id="${table.id}">
                                ${this.escapeHtml(table.name)}
                                <span class="delete-sheet" data-delete-id="${table.id}" onclick="event.stopPropagation()">✕</span>
                            </button>
                        `;
                    }).join('');

                    // Attach sheet click events
                    document.querySelectorAll('.sheet-tab').forEach(tab => {
                        tab.addEventListener('click', (e) => {
                            if (e.target.classList.contains('delete-sheet')) return;
                            const tableId = tab.dataset.tableId;
                            if (tableId) {
                                this.activeTableId = tableId;
                                this.render();
                            }
                        });
                    });

                    // Attach delete events
                    document.querySelectorAll('.delete-sheet').forEach(del => {
                        del.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const tableId = del.dataset.deleteId;
                            if (tableId) this.deleteTable(tableId);
                        });
                    });
                }

                renderTable() {
                    const tbody = document.getElementById('tableBody');
                    const selectAll = document.getElementById('selectAllCheckbox');
                    if (!tbody) return;

                    const table = this.getActiveTable();
                    if (!table) return;

                    const filteredIndices = this.getFilteredProducts();
                    
                    if (filteredIndices.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="2" class="empty-state">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                                    </svg>
                                    <p>${this.searchTerm ? 'No products match your search' : 'No products yet. Paste or add new rows.'}</p>
                                </td>
                            </tr>
                        `;
                        if (selectAll) selectAll.checked = false;
                        return;
                    }

                    tbody.innerHTML = filteredIndices.map((originalIdx, displayIdx) => `
                        <tr data-original-index="${originalIdx}">
                            <td>
                                <input type="checkbox" class="row-checkbox" data-display-index="${displayIdx}" style="accent-color: var(--accent);">
                            </td>
                            <td>
                                <input type="text" class="product-input" value="${this.escapeHtml(table.products[originalIdx])}" data-original-index="${originalIdx}" placeholder="Enter product name">
                            </td>
                        </tr>
                    `).join('');

                    // Attach input events
                    document.querySelectorAll('.product-input').forEach(input => {
                        input.addEventListener('input', (e) => {
                            const idx = e.target.dataset.originalIndex;
                            if (idx !== undefined) {
                                this.updateProduct(parseInt(idx), e.target.value);
                            }
                        });
                    });

                    // Attach checkbox events
                    document.querySelectorAll('.row-checkbox').forEach(cb => {
                        cb.addEventListener('change', () => this.updateSelectedCount());
                    });

                    if (selectAll) {
                        selectAll.checked = false;
                        selectAll.addEventListener('change', (e) => {
                            document.querySelectorAll('.row-checkbox').forEach(cb => {
                                cb.checked = e.target.checked;
                            });
                            this.updateSelectedCount();
                        });
                    }

                    this.updateSelectedCount();
                }

                updateStats() {
                    const table = this.getActiveTable();
                    if (!table) return;

                    const total = table.products.length;
                    const filtered = this.getFilteredProducts().length;
                    const statsEl = document.getElementById('tableStats');
                    
                    if (this.searchTerm) {
                        statsEl.textContent = `${filtered} of ${total} products`;
                    } else {
                        statsEl.textContent = `${total} products`;
                    }
                }

                updateSelectedCount() {
                    const selected = document.querySelectorAll('.row-checkbox:checked').length;
                    document.getElementById('selectedCount').textContent = `${selected} selected`;
                }

                // ========== HELPER ==========
                escapeHtml(str) {
                    return String(str).replace(/[&<>"]/g, function(match) {
                        if (match === '&') return '&amp;';
                        if (match === '<') return '&lt;';
                        if (match === '>') return '&gt;';
                        if (match === '"') return '&quot;';
                        return match;
                    });
                }

                showNotification(message, type = 'info') {
                    // Simple alert for now - can be enhanced with toast notifications
                    console.log(`[${type}] ${message}`);
                }

                // ========== EVENT HANDLERS ==========
                attachEvents() {
                    // New table
                    document.getElementById('newTableBtn')?.addEventListener('click', () => this.addTable());
                    document.getElementById('addSheetBtn')?.addEventListener('click', () => this.addTable());

                    // Delete selected
                    document.getElementById('deleteSelectedBtn')?.addEventListener('click', () => {
                        const selected = Array.from(document.querySelectorAll('.row-checkbox:checked'))
                            .map(cb => parseInt(cb.dataset.displayIndex));
                        if (selected.length > 0 && confirm(`Delete ${selected.length} product(s)?`)) {
                            this.deleteSelectedRows(selected);
                        }
                    });

                    // Paste
                    document.getElementById('pasteBtn')?.addEventListener('click', async () => {
                        try {
                            const text = await navigator.clipboard.readText();
                            const products = text.split(/\r?\n/).filter(line => line.trim() !== '');
                            if (products.length > 0) {
                                this.addProducts(products);
                                this.showNotification(`Added ${products.length} products`);
                            }
                        } catch (err) {
                            alert('Could not read clipboard. Please ensure clipboard permissions are granted.');
                        }
                    });

                    // Add empty row
                    document.getElementById('addEmptyRowBtn')?.addEventListener('click', () => {
                        this.addProducts(['']);
                    });

                    // Add samples
                    document.getElementById('addSampleBtn')?.addEventListener('click', () => {
                        const samples = [
                            'Lakmé 9to5 Primer + Matte Lipstick',
                            'Sugar Matte Attack Lipstick',
                            'Nykaa Wand of Beauty',
                            'Swiss Beauty Concealer',
                            'Plum Vanilla Vibes Body Mist',
                            'Mamaearth Vitamin C Serum',
                            'The Ordinary AHA 30%',
                            'Colorbar Flash Eyeshadow'
                        ];
                        this.addProducts(samples);
                    });

                    // Search
                    document.getElementById('globalSearch')?.addEventListener('input', (e) => {
                        this.searchTerm = e.target.value;
                        this.renderTable();
                        this.updateStats();
                    });
                }
            }

            // Initialize the application
            const inventory = new InventoryManager();
        })();
    </script>
</body>
</html>
